name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: 检查代码格式
        run: |
          go fmt ./...
          if [ -n "$(git diff --exit-code)" ]; then
            echo "代码格式不符合规范，请运行 'go fmt ./...' 后重新提交"
            git diff
            exit 1
          fi

      - name: 运行静态分析
        run: go vet ./...

      - name: 运行单元测试
        run: go test -v ./...

  release:
    name: 发布
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: 安装 upx
        run: sudo apt-get install -y upx

      - name: 获取版本信息
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 编译 linux-amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" \
            -o bin/airouter-linux-amd64 \
            ./cmd/airouter

      - name: 编译 linux-arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" \
            -o bin/airouter-linux-arm64 \
            ./cmd/airouter

      - name: 使用 upx 压缩二进制文件
        run: |
          upx --best bin/airouter-linux-amd64
          upx --best bin/airouter-linux-arm64

      - name: 显示文件信息
        run: ls -lh bin/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/airouter-linux-*
          generate_release_notes: true