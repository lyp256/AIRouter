# AIRouter 配置文件
# 所有配置项均有默认值，仅需覆盖需要修改的项

# 服务监听配置
server:
  host: "0.0.0.0"     # 监听地址
  port: 8080          # 监听端口

# 数据库配置
database:
  type: "sqlite"              # 数据库类型：sqlite 或 postgres
  path: "./data/airouter.db"  # SQLite 文件路径（type=sqlite 时）
  # PostgreSQL 配置（type=postgres 时取消注释）
  # host: "localhost"
  # port: 5432
  # user: "airouter"
  # password: "password"
  # database: "airouter"

# 安全配置
security:
  jwt_secret: "your-jwt-secret-key-change-me"         # JWT 签名密钥
  jwt_expire: "24h"                                    # JWT Token 过期时间
  admin_token: "your-admin-token-change-me"            # 管理 API 访问令牌

# 日志配置
logging:
  level: "info"    # 日志级别：debug, info, warn, error
  format: "json"   # 日志格式：json 或 text

# 限流配置
rate_limit:
  enabled: true       # 是否启用限流
  default_rpm: 60     # 默认每分钟最大请求数

# 重试配置（非流式请求的故障转移）
retry:
  enabled: true                          # 是否启用重试
  max_attempts: 3                        # 最大请求次数（含首次）
  initial_wait: "1s"                     # 首次重试等待时间
  max_wait: "30s"                        # 最大等待时间上限
  multiplier: 2.0                        # 指数退避乘数
  retry_on_codes: [429, 500, 502, 503, 504]  # 触发重试的上游状态码

# 初始管理员账户（首次启动自动创建，仅当数据库中无管理员时生效）
admin:
  username: "admin"
  password: "changeme"          # 请务必修改默认密码
  email: "admin@example.com"

# 缓存配置
cache:
  enabled: true              # 是否启用缓存
  type: "memory"             # 缓存类型：memory 或 redis
  ttl: "10m"                 # 默认缓存过期时间
  size: 64                   # 内存缓存大小（MB，仅 type=memory 时生效）
  # Redis 配置（type=redis 时取消注释）
  # redis:
  #   addr: "localhost:6379"
  #   password: ""
  #   db: 0

# 上游健康检查配置
health_check:
  enabled: true                # 是否启用健康检查服务
  full_check_interval: "5m"    # 全量检查间隔（检查所有启用上游）
  recovery_interval: "30s"     # 恢复检查间隔（仅检查不健康上游）
  timeout: "10s"               # 单次探测超时
  healthy_threshold: 2         # 连续成功次数达此阈值标记为健康
  unhealthy_threshold: 3       # 连续失败次数达此阈值标记为不健康
  leader_lease: "30s"          # 分布式选主租约时长（Redis 缓存模式下生效）
  leader_renew_interval: "10s" # 选主续约间隔
