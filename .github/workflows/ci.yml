name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: 检查代码格式
        run: |
          go fmt ./...
          if [ -n "$(git diff --exit-code)" ]; then
            echo "代码格式不符合规范，请运行 'go fmt ./...' 后重新提交"
            git diff
            exit 1
          fi

      - name: 运行静态分析
        run: go vet ./...

      - name: 运行单元测试
        run: go test -v ./...